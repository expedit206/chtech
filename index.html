<!doctype html>
<html lang="fr">
  <head>
    <!-- Encodage et méta essentielles -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <!-- Title et meta description (premiers facteurs SEO) -->
    <title>
      Sasaye – Boutique en ligne au Cameroun | Achetez au meilleur prix
    </title>
    <meta
      name="description"
      content="Sasaye : la première plateforme de shopping en ligne au Cameroun. Découvrez des milliers de produits de qualité à prix compétitifs. Livraison rapide et sécurisée dans tout le Cameroun. Achetez maintenant !"
    />
    <meta
      name="keywords"
      content="boutique en ligne Cameroun, shopping en ligne, achat en ligne Cameroun, e-commerce Cameroun, magasin en ligne, produits Cameroun, livraison Cameroun, prix compétitifs"
    />

    <!-- Meta informations supplémentaires -->
    <meta name="author" content="Sasaye" />
    <meta name="creator" content="Sasaye" />
    <meta name="publisher" content="Sasaye" />
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />
    <meta name="language" content="French" />
    <meta name="revisit-after" content="7 days" />
    <meta name="rating" content="general" />

    <!-- Couleur et branding -->
    <meta name="theme-color" content="#ffffff" />
    <meta name="msapplication-TileColor" content="#ffffff" />

    <!-- Canonical URL (important pour éviter le duplicate content) -->
    <link rel="canonical" href="https://sasaye.com/" />

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Sasaye – La boutique en ligne #1 du Cameroun"
    />
    <meta
      property="og:description"
      content="Achetez vos produits préférés en ligne avec Sasaye. Meilleurs prix, livraison rapide et service client 24/7."
    />
    <meta property="og:url" content="https://sasaye.com/" />
    <meta property="og:image" content="https://sasaye.com/logo.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Sasaye - Boutique en ligne au Cameroun"
    />
    <meta property="og:locale" content="fr_CM" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Sasaye – Boutique en ligne au Cameroun"
    />
    <meta
      name="twitter:description"
      content="Achetez au meilleur prix avec la livraison rapide et sécurisée"
    />
    <meta name="twitter:image" content="https://sasaye.com/logo.png" />
    <meta name="twitter:site" content="@sasaye_cm" />
    <meta name="twitter:creator" content="@sasaye_cm" />

    <!-- Structuré data (JSON-LD) pour les moteurs de recherche -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Sasaye",
        "description": "Boutique en ligne au Cameroun",
        "url": "https://sasaye.com",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://sasaye.com/search?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- Organisation structurée (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "name": "Sasaye",
        "description": "Plateforme de e-commerce au Cameroun",
        "url": "https://sasaye.com",
        "logo": "https://sasaye.com/logo.png",
        "telephone": "+237683461329",
        "email": "contact@sasaye.com",
        "areaServed": "CM",
        "priceRange": "$$",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "",
          "addressLocality": "Bafousam",
          "addressRegion": "Ouest",
          "postalCode": "",
          "addressCountry": "CM"
        },
        "sameAs": [
          "https://www.facebook.com/sasaye",
          "https://www.instagram.com/sasaye",
          "https://twitter.com/sasaye_cm"
        ]
      }
    </script>

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/src/assets/logo.png" />
    <link rel="apple-touch-icon" href="/src/assets/logo.png" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="src/assets/logo.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="src/assets/logo.png"
    />

    <!-- Preconnect aux ressources externes (performance) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />

    <!-- Sitemap et RSS (facultatif) -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Security headers -->
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
